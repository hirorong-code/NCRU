<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PMNT Rev.1.30: Visualizing Energy Landscape</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
    <style>
        body { background-color: #050505; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .vis-frame { border: 2px solid #00ffcc; padding: 25px; background: #000; width: 1100px; display: flex; gap: 30px; }
        .map-box { flex: 1; border: 1px solid #333; padding: 15px; position: relative; }
        .land-box { flex: 1.5; border: 1px solid #333; padding: 15px; position: relative; }
        .label { font-size: 0.8rem; color: #fff; position: absolute; }
    </style>
</head>
<body>

<div class="vis-frame">
    
    <div class="map-box">
        <h3 style="margin: 0 0 10px 0; color: #ffcc00; font-size: 1rem;">1. PHYSICAL LATTICE MAP (10nm)</h3>
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="atomGrid" width="15" height="15" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="1.1" fill="#ffffff" opacity="0.1" />
                </pattern>
                <marker id="vU" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="4" markerHeight="4" orient="auto">
                    <path d="M 5 0 L 10 10 L 0 10 Z" fill="#00ffcc" />
                </marker>
            </defs>
            <rect width="400" height="400" fill="url(#atomGrid)" />

            <path d="M 30 150 L 140 150" stroke="#fff" stroke-width="2" opacity="0.4" stroke-dasharray="4,2" />
            <path d="M 30 250 L 140 250" stroke="#fff" stroke-width="2" opacity="0.4" stroke-dasharray="4,2" />

            <circle cx="150" cy="150" r="12" fill="none" stroke="#00ffcc" stroke-width="2" />
            <text x="175" y="145" fill="#00ffcc" font-weight="bold" font-size="12">NV-A</text>
            <circle cx="150" cy="250" r="12" fill="none" stroke="#00ffcc" stroke-width="2" />
            <text x="175" y="245" fill="#00ffcc" font-weight="bold" font-size="12">NV-B</text>

            <path d="M 150 150 L 150 250" stroke="#ff00ff" stroke-width="5" opacity="0.6" fill="none" />
            <text x="110" y="210" fill="#ff00ff" font-size="11" transform="rotate(-90 110 210)">H_dip (Constraint)</text>

            <line x1="150" y1="140" x2="150" y2="120" stroke="#00ffcc" stroke-width="4" marker-end="url(#vU)" />
            <circle cx="150" cy="250" r="5" fill="#444" stroke="#888" />

            <line x1="300" y1="370" x2="380" y2="370" stroke="#fff" stroke-width="1.5" />
            <text x="325" y="385" fill="#fff" font-size="10">≈ 2.0 nm</text>
        </svg>
        <div style="font-size:0.8rem; color:#ccc; margin-top:10px;">
            AとBを近接配置し、強固な結合（$H_{dip}$）を形成。一方が「活性（1）」になると、隣の井戸を物理的に破壊する拘束条件。
        </div>
    </div>

    <div class="land-box">
        <h3 style="margin: 0 0 10px 0; color: #ffcc00; font-size: 1rem;">2. ENERGY LANDSCAPE (The "Problem Space")</h3>
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <path d="M 50 350 L 550 350 L 550 50 Z" fill="none" stroke="#666" stroke-width="1" />
            <text x="20" y="360" fill="#ccc" font-size="10">V(A,B)</text>
            <text x="560" y="360" fill="#ccc" font-size="10">A-Activity</text>
            <text x="560" y="60" fill="#ccc" font-size="10">B-Activity</text>

            <ellipse cx="50" cy="350" rx="30" ry="20" fill="rgba(0,255,204,0.05)" stroke="#00ffcc" stroke-dasharray="2,2" />
            <text x="20" y="390" fill="#00ffcc" font-size="10">Stable (0,0)</text>

            <path d="M 300 250 C 350 150, 450 100, 500 50" fill="none" stroke="#ff00ff" stroke-width="6" opacity="0.8" />
            <text x="370" y="150" fill="#ff00ff" font-size="12" font-weight="bold">Ridgeline (A+B ↑↑)</text>
            
            <circle cx="500" cy="350" r="15" fill="#444" stroke="#888" />
            <text x="470" y="380" fill="#ccc" font-size="10">Valley A(1)-B(0)</text>
            <circle cx="50" cy="100" r="15" fill="#444" stroke="#888" />
            <text x="10" y="90" fill="#ccc" font-size="10">Valley A(0)-B(1)</text>
            
            <circle cx="280" cy="260" r="6" fill="#00ffcc">
                <animate attributeName="cx" values="280;480;495" dur="1s" fill="freeze" />
                <animate attributeName="cy" values="260;330;345" dur="1s" fill="freeze" />
            </circle>
            <text x="210" y="280" fill="#fff" font-size="10">Relaxisng towards (1,0)</text>
        </svg>
        <div style="font-size:0.8rem; color:#ccc; margin-top:10px;">
            Input A, B流入により地形が「地殻変動」。系は高いエネルギー状態（尾根）を避け、自発的に（1,0）または（0,1）の谷へ緩和する。
        </div>
    </div>
</div>

</body>
</html>
